<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planify - Registrarse</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1E3A5F 0%, #4A90D9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signup-container {
      width: 100%;
      max-width: 500px;
      padding: 1rem;
    }

    .signup-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 2.5rem;
    }

    .signup-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .signup-header .logo-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .signup-header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #1E3A5F;
      margin-bottom: 0.5rem;
    }

    .signup-header p {
      color: #999;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4A90D9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
    }

    .avatar-section {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #f9f9f9;
      border-radius: 8px;
    }

    .avatar-section label {
      display: block;
      margin-bottom: 1rem;
      color: #333;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .avatares-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 1rem;
    }

    .avatar-option {
      position: relative;
    }

    .avatar-option input[type="radio"] {
      display: none;
    }

    .avatar-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
    }

    .avatar-label:hover {
      border-color: #4A90D9;
      background: #f0f7ff;
    }

    .avatar-option input[type="radio"]:checked + .avatar-label {
      border-color: #4A90D9;
      background: #e8f4f8;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
    }

    .avatar-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #4A90D9;
    }

    .avatar-name {
      font-size: 0.7rem;
      color: #666;
      text-align: center;
    }

    .btn-signup {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #1E3A5F 0%, #4A90D9 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-signup:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(30, 58, 95, 0.3);
    }

    .mensaje-error {
      background: #fee;
      color: #c33;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
      border-left: 4px solid #c33;
    }

    .mensaje-error.show {
      display: block;
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #666;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #4A90D9;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }

    .login-link a:hover {
      text-decoration: underline;
      color: #1E3A5F;
    }
  </style>
</head>
<body>

  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-header">
        <div class="logo-icon">📅</div>
        <h1>Planify</h1>
        <p>Crea tu cuenta para comenzar</p>
      </div>

      <div class="mensaje-error" id="mensaje-error"></div>

      <form id="form-signup">
        <div class="form-group">
          <label for="input-nombre">Nombre completo</label>
          <input type="text" id="input-nombre" placeholder="Tu nombre" required />
        </div>

        <div class="form-group">
          <label for="input-email">Email</label>
          <input type="email" id="input-email" placeholder="tu@email.com" required />
        </div>

        <div class="form-group">
          <label for="input-password">Contraseña</label>
          <input type="password" id="input-password" placeholder="••••••••" required />
        </div>

        <div class="form-group">
          <label for="input-password-confirm">Confirmar contraseña</label>
          <input type="password" id="input-password-confirm" placeholder="••••••••" required />
        </div>

        <div class="avatar-section">
          <label>Selecciona tu avatar</label>
          <div class="avatares-grid">
            <div class="avatar-option">
              <input type="radio" id="avatar-1" name="avatar" value="bi-person-circle" required />
              <label for="avatar-1" class="avatar-label">
                <i class="bi bi-person-circle avatar-icon"></i>
                <span class="avatar-name">Círculo</span>
              </label>
            </div>
            <div class="avatar-option">
              <input type="radio" id="avatar-2" name="avatar" value="bi-person-fill" />
              <label for="avatar-2" class="avatar-label">
                <i class="bi bi-person-fill avatar-icon"></i>
                <span class="avatar-name">Lleno</span>
              </label>
            </div>
            <div class="avatar-option">
              <input type="radio" id="avatar-3" name="avatar" value="bi-emoji-smile" />
              <label for="avatar-3" class="avatar-label">
                <i class="bi bi-emoji-smile avatar-icon"></i>
                <span class="avatar-name">Sonrisa</span>
              </label>
            </div>
            <div class="avatar-option">
              <input type="radio" id="avatar-4" name="avatar" value="bi-person-heart" />
              <label for="avatar-4" class="avatar-label">
                <i class="bi bi-person-heart avatar-icon"></i>
                <span class="avatar-name">Corazón</span>
              </label>
            </div>
            <div class="avatar-option">
              <input type="radio" id="avatar-5" name="avatar" value="bi-person-badge" />
              <label for="avatar-5" class="avatar-label">
                <i class="bi bi-person-badge avatar-icon"></i>
                <span class="avatar-name">Badge</span>
              </label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-signup">
          <i class="bi bi-person-plus mr-2"></i>Crear cuenta
        </button>
      </form>

      <div class="login-link">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
      </div>
    </div>
  </div>

  <script src="js/Signup.js"></script>
</body>
</html>
