<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planify - Iniciar Sesión</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0F2744 0%, #1a3a52 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 2.5rem;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header .logo-icon {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
      color: #3B82F6;
    }

    .login-header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #0F2744;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: #999;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #E2E8F0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3B82F6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 1.1rem;
      transition: all 0.3s;
    }

    .password-toggle-btn:hover {
      color: #3B82F6;
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #3B82F6 0%, #06B6D4 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .mensaje-error {
      background: #FEF2F2;
      color: #991B1B;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      border-left: 4px solid #EF4444;
    }

    .mensaje-error.show {
      display: block;
    }

    .divider {
      margin: 1.5rem 0;
      color: #ccc;
      text-align: center;
      font-size: 0.85rem;
    }

    .registro-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #666;
      font-size: 0.9rem;
    }

    .registro-link a {
      color: #3B82F6;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }

    .registro-link a:hover {
      text-decoration: underline;
      color: #0F2744;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">
          <i class="bi bi-calendar2-check-fill"></i>
        </div>
        <h1>Planify</h1>
        <p>Inicia sesión en tu agenda estudiantil</p>
      </div>

      <div class="mensaje-error" id="mensaje-error"></div>

      <form id="form-login">
        <div class="form-group">
          <label for="input-email">Email</label>
          <input type="email" id="input-email" placeholder="tu@email.com" required />
        </div>

        <div class="form-group">
          <label for="input-password">Contraseña</label>
          <div class="password-toggle">
            <input type="password" id="input-password" placeholder="••••••••" required />
            <button type="button" class="password-toggle-btn" id="btn-toggle-pass" title="Mostrar/ocultar contraseña">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right mr-2"></i>Iniciar sesión
        </button>
      </form>

      <div class="divider">O</div>

      <div class="registro-link">
        ¿No tienes cuenta? <a href="signup.html">Regístrate aquí</a>
      </div>
    </div>
  </div>

  <script src="js/Login.js"></script>
</body>
</html>
